<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Operaciones</title>
    <style>
      :root {
        --bg1: #071226;
        --bg2: #0b1b3a;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(255, 255, 255, 0.08);
        --line: rgba(255, 255, 255, 0.12);
        --text: #eaf1ff;
        --muted: rgba(234, 241, 255, 0.75);
        --accent: #4f8cff;
        --ok: #35d07f;
        --warn: #ffcc66;
        --bad: #ff6b6b;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 700px at 20% 0%, rgba(79,140,255,0.18), transparent 55%),
          radial-gradient(900px 500px at 80% 10%, rgba(53,208,127,0.14), transparent 55%),
          linear-gradient(180deg, var(--bg1), var(--bg2));
        min-height: 100vh;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 48px 18px 64px;
      }

      h1 {
        margin: 0 0 10px;
        letter-spacing: 0.3px;
        font-size: 34px;
        font-weight: 800;
      }

      .subtitle {
        margin: 0 0 22px;
        color: var(--muted);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 14px 40px rgba(0,0,0,0.35);
        backdrop-filter: blur(10px);
      }

      .row {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr auto;
        gap: 12px;
        align-items: end;
      }

      @media (max-width: 920px) {
        .row { grid-template-columns: 1fr; }
        button { width: 100%; }
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 6px;
      }

      input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(0,0,0,0.18);
        color: var(--text);
        outline: none;
      }

      input:focus {
        border-color: rgba(79,140,255,0.7);
        box-shadow: 0 0 0 3px rgba(79,140,255,0.18);
      }

      button {
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid rgba(79,140,255,0.55);
        background: linear-gradient(180deg, rgba(79,140,255,0.95), rgba(79,140,255,0.70));
        color: white;
        font-weight: 700;
        cursor: pointer;
        height: 44px;
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .meta {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: var(--card2);
        font-size: 12px;
        color: var(--muted);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--muted);
      }

      .dot.ok { background: var(--ok); }
      .dot.bad { background: var(--bad); }
      .dot.warn { background: var(--warn); }

      .tableWrap {
        margin-top: 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
        background: rgba(0,0,0,0.14);
      }

      thead th {
        position: sticky;
        top: 0;
        background: rgba(0,0,0,0.35);
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 12px 12px;
        font-size: 12px;
        color: rgba(234,241,255,0.85);
        white-space: nowrap;
      }

      tbody td {
        border-bottom: 1px solid rgba(255,255,255,0.07);
        padding: 12px 12px;
        font-size: 13px;
        color: rgba(234,241,255,0.92);
        white-space: nowrap;
      }

      tbody tr:hover {
        background: rgba(79,140,255,0.08);
      }

      .empty, .errorBox {
        margin-top: 14px;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(0,0,0,0.18);
        color: var(--muted);
      }

      .errorBox {
        border-color: rgba(255,107,107,0.45);
        color: rgba(255,220,220,0.95);
      }

      .hint {
        margin-top: 10px;
        font-size: 12px;
        color: rgba(234,241,255,0.65);
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <h1>Consulta de Operaciones</h1>
      <p class="subtitle">Busca por placa y opcionalmente por rango de fechas.</p>

      <div class="card">
        <div class="row">
          <div>
            <label for="plate">Placa del vehículo</label>
            <input id="plate" placeholder="Ej: WOM140" />
          </div>

          <div>
            <label for="startDate">Fecha inicio</label>
            <input type="date" id="startDate" />
          </div>

          <div>
            <label for="endDate">Fecha final</label>
            <input type="date" id="endDate" />
          </div>

          <div>
            <button id="btn" onclick="submitForm()">Buscar</button>
          </div>
        </div>

        <div class="meta">
          <span class="pill" id="pillStatus">
            <span class="dot" id="dot"></span>
            <span id="statusText">Listo</span>
          </span>
          <span class="pill" id="pillTime" style="display:none;">
            Tiempo: <span id="timeMs">0</span> ms
          </span>
          <span class="pill" id="pillCount" style="display:none;">
            Resultados: <span id="count">0</span>
          </span>
        </div>

        <div id="out"></div>

        <div class="hint">
          Nota: la placa se normaliza automáticamente (mayúscula, sin espacios ni símbolos).
        </div>
      </div>
    </div>

    <script>
      // ✅ SOLO MUESTRA ESTAS COLUMNAS (por índice dentro de la fila)
      // Basado en tu ejemplo actual:
      // Col 5 = WOM140 => index 4
      // Col 6 = WILMAN BAUTISTA => index 5
      // Col 7 = BUCARAMANGA => index 6
      // Col 8 = 14.5 => index 7
      // Col 11 = 1890000 => index 10
      const COLUMN_MAP = [
        { label: "Placa", index: 4 },
        { label: "Conductor", index: 5 },
        { label: "Origen", index: 6 },
        { label: "Toneladas", index: 7, format: "num" },
        { label: "Flete", index: 10, format: "money" },
      ];

      function normalizePlate(s) {
        return (s || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
      }

      function setStatus(kind, text) {
        const dot = document.getElementById("dot");
        dot.className = "dot " + (kind || "");
        document.getElementById("statusText").innerText = text || "";
      }

      function escapeHtml(v) {
        const s = String(v ?? "");
        return s
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function safeNumber(v) {
        const n = Number(v);
        return Number.isFinite(n) ? n : null;
      }

      function formatCell(v, format) {
        if (v === null || v === undefined) return "";
        if (!format) return String(v);

        if (format === "num") {
          const n = safeNumber(v);
          return n === null ? String(v) : n.toLocaleString("es-CO");
        }

        if (format === "money") {
          const n = safeNumber(v);
          return n === null
            ? String(v)
            : n.toLocaleString("es-CO", { style: "currency", currency: "COP", maximumFractionDigits: 0 });
        }

        return String(v);
      }

      function renderTable(rows) {
        const out = document.getElementById("out");

        if (!Array.isArray(rows) || rows.length === 0) {
          out.innerHTML = `<div class="empty">Sin resultados.</div>`;
          return;
        }

        // Asegura que sean arrays
        rows = rows.filter(r => Array.isArray(r));
        if (rows.length === 0) {
          out.innerHTML = `<div class="empty">Sin resultados.</div>`;
          return;
        }

        const thead = `<thead><tr>${
          COLUMN_MAP.map(c => `<th>${escapeHtml(c.label)}</th>`).join("")
        }</tr></thead>`;

        const tbody = `<tbody>${
          rows.map(r => {
            const tds = COLUMN_MAP.map(c => {
              const raw = r[c.index];
              const val = formatCell(raw, c.format);
              return `<td>${escapeHtml(val)}</td>`;
            }).join("");
            return `<tr>${tds}</tr>`;
          }).join("")
        }</tbody>`;

        out.innerHTML = `<div class="tableWrap"><table>${thead}${tbody}</table></div>`;
      }

      async function submitForm() {
        const btn = document.getElementById("btn");
        const plate = normalizePlate(document.getElementById("plate").value);
        const startDate = document.getElementById("startDate").value || null;
        const endDate = document.getElementById("endDate").value || null;

        document.getElementById("pillTime").style.display = "none";
        document.getElementById("pillCount").style.display = "none";
        document.getElementById("out").innerHTML = "";

        if (!plate) {
          setStatus("warn", "Ingresa una placa válida (sin símbolos).");
          alert("⚠️ La placa debe ingresarse SIN espacios, puntos o guiones.");
          return;
        }

        btn.disabled = true;
        setStatus("", "Consultando...");

        const t0 = performance.now();

        try {
          const resp = await fetch("/api/buscar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ plate, startDate, endDate }),
          });

          const t1 = performance.now();
          document.getElementById("pillTime").style.display = "inline-flex";
          document.getElementById("timeMs").innerText = Math.round(t1 - t0);

          const text = await resp.text();

          if (!resp.ok) {
            setStatus("bad", "Error");
            document.getElementById("out").innerHTML =
              `<div class="errorBox"><b>Error HTTP ${resp.status}</b><br/><br/><pre style="white-space:pre-wrap;margin:0;">${escapeHtml(text)}</pre></div>`;
            return;
          }

          // Intentar parsear JSON (tu API devuelve arrays)
          let data;
          try {
            data = JSON.parse(text);
          } catch {
            // Si el API devolvió texto (por ejemplo error), mostrarlo
            setStatus("warn", "Respuesta no es JSON");
            document.getElementById("out").innerHTML =
              `<div class="errorBox"><b>La API no devolvió JSON.</b><br/><br/><pre style="white-space:pre-wrap;margin:0;">${escapeHtml(text)}</pre></div>`;
            return;
          }

          // data puede ser [ [..fila..], [..fila..] ] o { rows: [...] }
          const rows = Array.isArray(data) ? data : (data && data.rows) ? data.rows : [];

          document.getElementById("pillCount").style.display = "inline-flex";
          document.getElementById("count").innerText = Array.isArray(rows) ? rows.length : 0;

          if (!Array.isArray(rows) || rows.length === 0) {
            setStatus("warn", "Sin resultados");
            document.getElementById("out").innerHTML = `<div class="empty">Sin resultados.</div>`;
            return;
          }

          setStatus("ok", "OK");
          renderTable(rows);

        } catch (e) {
          setStatus("bad", "Error de conexión");
          document.getElementById("out").innerHTML =
            `<div class="errorBox"><b>Error de conexión</b><br/><br/>${escapeHtml(e?.message || e)}</div>`;
        } finally {
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
