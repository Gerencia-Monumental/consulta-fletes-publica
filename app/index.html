<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Operaciones</title>
    <style>
      :root {
        --bg1: #06132a;
        --bg2: #051a1d;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(0, 0, 0, 0.25);
        --text: #eaf2ff;
        --muted: rgba(234, 242, 255, 0.7);
        --line: rgba(255, 255, 255, 0.10);
        --accent: #3b82f6;
        --ok: #22c55e;
        --err: #ef4444;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        color: var(--text);
        min-height: 100vh;
        background: radial-gradient(1200px 600px at 30% 0%, #0b2b63 0%, transparent 60%),
                    radial-gradient(900px 500px at 80% 10%, #0b4b3f 0%, transparent 55%),
                    linear-gradient(180deg, var(--bg1), var(--bg2));
        display: flex;
        justify-content: center;
        padding: 42px 18px;
      }

      .wrap { width: min(1100px, 100%); }

      h1 {
        margin: 0 0 10px 0;
        font-size: 42px;
        letter-spacing: 0.2px;
      }

      .sub { margin: 0 0 22px 0; color: var(--muted); }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.35);
        backdrop-filter: blur(10px);
      }

      .grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr auto;
        gap: 14px;
        align-items: end;
      }

      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }

      input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(0,0,0,0.25);
        color: var(--text);
        outline: none;
      }

      input:focus {
        border-color: rgba(59,130,246,0.65);
        box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
      }

      button {
        padding: 12px 18px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(59,130,246,1), rgba(37,99,235,1));
        color: white;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(59,130,246,0.25);
      }

      button:disabled { opacity: 0.6; cursor: not-allowed; }

      .badges {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .badge {
        border: 1px solid var(--line);
        background: rgba(0,0,0,0.18);
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
      }

      .badge.ok { color: #bbf7d0; border-color: rgba(34,197,94,0.35); }
      .badge.err { color: #fecaca; border-color: rgba(239,68,68,0.35); }

      .table-wrap {
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: auto;
        background: var(--card2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 760px;
      }

      thead th {
        text-align: left;
        font-size: 12px;
        color: var(--muted);
        padding: 12px 12px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }

      tbody td {
        padding: 12px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        font-size: 13px;
        white-space: nowrap;
      }

      tbody tr:hover td { background: rgba(255,255,255,0.03); }

      .note { margin-top: 10px; color: var(--muted); font-size: 12px; }

      @media (max-width: 880px) {
        .grid { grid-template-columns: 1fr; }
        button { width: 100%; }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <h1>Consulta de Operaciones</h1>
      <p class="sub">Busca por placa y opcionalmente por rango de fechas.</p>

      <div class="card">
        <div class="grid">
          <div>
            <label for="plate">Placa del vehículo</label>
            <input id="plate" placeholder="Ej: WOM140" />
          </div>

          <div>
            <label for="startDate">Fecha inicio</label>
            <input type="date" id="startDate" />
          </div>

          <div>
            <label for="endDate">Fecha final</label>
            <input type="date" id="endDate" />
          </div>

          <div>
            <button id="btn" onclick="submitForm()">Buscar</button>
          </div>
        </div>

        <div class="badges" id="badges" style="display:none;">
          <span class="badge" id="statusBadge">Estado</span>
          <span class="badge" id="timeBadge">Tiempo</span>
          <span class="badge" id="countBadge">Resultados</span>
        </div>

        <div class="table-wrap" style="margin-top: 14px;">
          <table>
            <thead>
              <tr id="theadRow"></tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="note">
          Nota: la placa se normaliza automáticamente (mayúscula, sin espacios ni símbolos).
        </div>
      </div>
    </div>

    <script>
      // =========================
      // CONFIG: columnas a mostrar
      // =========================
      // Excel: A=0, B=1, C=2, D=3, E=4, F=5, J=9, K=10, L=11, M=12, N=13, S=18
      const COLUMNS = [
        { letter: "A", idx: 0,  type: "dateMask" },
        { letter: "B", idx: 1,  type: "text"     },
        { letter: "C", idx: 2,  type: "dateMask" },
        { letter: "D", idx: 3,  type: "dateMask" },
        { letter: "E", idx: 4,  type: "firstLetterMask" },
        { letter: "F", idx: 5,  type: "firstLetterMask" },
        { letter: "J", idx: 9,  type: "text"     },
        { letter: "K", idx: 10, type: "text"     },
        { letter: "L", idx: 11, type: "text"     },
        { letter: "M", idx: 12, type: "text"     },
        { letter: "N", idx: 13, type: "text"     },
        { letter: "S", idx: 18, type: "text"     },
      ];

      // =========================
      // Helpers de formato
      // =========================
      function normalizePlate(s) {
        return (s || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
      }

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      // Convierte posibles formatos a {dd, mm} y devuelve "DD-MM-****"
      function dateMask(value) {
        if (value === null || value === undefined || value === "") return "";

        // Si viene como número (posible serial Excel)
        if (typeof value === "number" && isFinite(value)) {
          // Excel serial date (base 1899-12-30)
          const base = new Date(Date.UTC(1899, 11, 30));
          const d = new Date(base.getTime() + value * 86400000);
          const dd = pad2(d.getUTCDate());
          const mm = pad2(d.getUTCMonth() + 1);
          return `${dd}-${mm}-****`;
        }

        const s = String(value).trim();

        // ISO: YYYY-MM-DD
        const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (iso) {
          const mm = iso[2];
          const dd = iso[3];
          return `${dd}-${mm}-****`;
        }

        // DD/MM/YYYY o DD-MM-YYYY
        const dmy = s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})/);
        if (dmy) {
          const dd = pad2(dmy[1]);
          const mm = pad2(dmy[2]);
          return `${dd}-${mm}-****`;
        }

        // Si viene tipo "2026/03/04" o similar
        const ymd = s.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
        if (ymd) {
          const mm = pad2(ymd[2]);
          const dd = pad2(ymd[3]);
          return `${dd}-${mm}-****`;
        }

        // Si no podemos parsear, lo devolvemos tal cual (mejor que romper)
        return s;
      }

      // E/F: primera letra + *****
      function firstLetterMask(value) {
        if (value === null || value === undefined) return "";
        const s = String(value).trim();
        if (!s) return "";
        return s[0].toUpperCase() + "*****";
      }

      function applyType(type, value) {
        switch (type) {
          case "dateMask": return dateMask(value);
          case "firstLetterMask": return firstLetterMask(value);
          default: return (value === null || value === undefined) ? "" : String(value);
        }
      }

      // Soporta filas como array o como objeto con claves tipo A,B,C...
      function getCell(row, col) {
        if (Array.isArray(row)) return row[col.idx];
        // si el backend devuelve objeto {A:..., B:...} o {0:...}
        if (row && typeof row === "object") {
          if (col.letter in row) return row[col.letter];
          if (String(col.idx) in row) return row[String(col.idx)];
        }
        return "";
      }

      // =========================
      // Render de tabla
      // =========================
      function renderHeader() {
        const tr = document.getElementById("theadRow");
        tr.innerHTML = "";
        for (const c of COLUMNS) {
          const th = document.createElement("th");
          // Encabezado por letra (A,B,C...) tal como pediste
          th.textContent = c.letter;
          tr.appendChild(th);
        }
      }

      function renderRows(rows) {
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";

        if (!rows || !rows.length) return;

        for (const row of rows) {
          const tr = document.createElement("tr");
          for (const c of COLUMNS) {
            const td = document.createElement("td");
            const raw = getCell(row, c);
            td.textContent = applyType(c.type, raw);
            tr.appendChild(td);
          }
          tbody.appendChild(tr);
        }
      }

      // =========================
      // Submit
      // =========================
      renderHeader();

      async function submitForm() {
        const btn = document.getElementById("btn");
        btn.disabled = true;

        const plate = normalizePlate(document.getElementById("plate").value);
        if (!plate) {
          alert("⚠️ La placa debe ingresarse SIN espacios, puntos, guiones u otros caracteres especiales.");
          btn.disabled = false;
          return;
        }

        const startDate = document.getElementById("startDate").value || null;
        const endDate = document.getElementById("endDate").value || null;

        document.getElementById("badges").style.display = "flex";
        const statusBadge = document.getElementById("statusBadge");
        const timeBadge = document.getElementById("timeBadge");
        const countBadge = document.getElementById("countBadge");

        statusBadge.className = "badge";
        statusBadge.textContent = "Consultando...";
        timeBadge.textContent = "Tiempo: ...";
        countBadge.textContent = "Resultados: ...";

        const t0 = performance.now();

        try {
          const resp = await fetch("/api/buscar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ plate, startDate, endDate }),
          });

          const ms = Math.round(performance.now() - t0);
          timeBadge.textContent = `Tiempo: ${ms} ms`;

          const contentType = (resp.headers.get("content-type") || "").toLowerCase();
          let data;

          // Intentar JSON (ideal)
          if (contentType.includes("application/json")) {
            data = await resp.json();
          } else {
            // Si backend aún devuelve texto, intentamos parsearlo
            const text = await resp.text();
            try { data = JSON.parse(text); }
            catch { data = { ok: resp.ok, rows: [] }; }
          }

          // Normalizar: esperamos { rows: [...] } o directamente [...]
          const rows = Array.isArray(data) ? data : (data.rows || data.data || []);

          countBadge.textContent = `Resultados: ${rows.length}`;

          if (!resp.ok) {
            statusBadge.className = "badge err";
            statusBadge.textContent = "Error";
            renderRows([]);
            alert("El servidor respondió con error. Revisa el log de la API.");
          } else {
            statusBadge.className = "badge ok";
            statusBadge.textContent = "OK";
            renderRows(rows);
          }
        } catch (e) {
          statusBadge.className = "badge err";
          statusBadge.textContent = "Error";
          renderRows([]);
          alert("Error consultando la API. Revisa conexión o logs.");
        } finally {
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
