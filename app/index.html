<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consulta de Operaciones</title>
    <style>
      :root {
        --bg1: #06132a;
        --bg2: #051a1d;
        --card: rgba(255, 255, 255, 0.06);
        --card2: rgba(0, 0, 0, 0.25);
        --text: #eaf2ff;
        --muted: rgba(234, 242, 255, 0.7);
        --line: rgba(255, 255, 255, 0.10);
        --accent: #3b82f6;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        color: var(--text);
        min-height: 100vh;
        background: radial-gradient(1200px 600px at 30% 0%, #0b2b63 0%, transparent 60%),
                    radial-gradient(900px 500px at 80% 10%, #0b4b3f 0%, transparent 55%),
                    linear-gradient(180deg, var(--bg1), var(--bg2));
        display: flex;
        justify-content: center;
        padding: 42px 18px;
      }

      .wrap { width: min(1200px, 100%); }

      h1 { margin: 0 0 10px 0; font-size: 42px; }
      .sub { margin: 0 0 22px 0; color: var(--muted); }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.35);
        backdrop-filter: blur(10px);
      }

      .grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr auto;
        gap: 14px;
        align-items: end;
      }

      label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }

      input {
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(0,0,0,0.25);
        color: var(--text);
        outline: none;
      }

      input:focus {
        border-color: rgba(59,130,246,0.65);
        box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
      }

      button {
        padding: 12px 18px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(180deg, rgba(59,130,246,1), rgba(37,99,235,1));
        color: white;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 18px rgba(59,130,246,0.25);
      }

      button:disabled { opacity: 0.6; cursor: not-allowed; }

      .badges {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .badge {
        border: 1px solid var(--line);
        background: rgba(0,0,0,0.18);
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 12px;
        color: var(--muted);
      }

      .badge.ok { color: #bbf7d0; border-color: rgba(34,197,94,0.35); }
      .badge.err { color: #fecaca; border-color: rgba(239,68,68,0.35); }

      .table-wrap {
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: auto;
        background: var(--card2);
      }

      table { width: 100%; border-collapse: collapse; min-width: 900px; }
      thead th {
        text-align: left;
        font-size: 12px;
        color: var(--muted);
        padding: 12px 12px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }

      tbody td {
        padding: 12px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        font-size: 13px;
        white-space: nowrap;
      }

      tbody tr:hover td { background: rgba(255,255,255,0.03); }

      .note { margin-top: 10px; color: var(--muted); font-size: 12px; }

      @media (max-width: 880px) {
        .grid { grid-template-columns: 1fr; }
        button { width: 100%; }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <h1>Consulta de Operaciones</h1>
      <p class="sub">Busca por placa y opcionalmente por rango de fechas.</p>

      <div class="card">
        <div class="grid">
          <div>
            <label for="plate">Placa del vehículo</label>
            <input id="plate" placeholder="Ej: WOM140" />
          </div>

          <div>
            <label for="startDate">Fecha inicio</label>
            <input type="date" id="startDate" />
          </div>

          <div>
            <label for="endDate">Fecha final</label>
            <input type="date" id="endDate" />
          </div>

          <div>
            <button id="btn" onclick="submitForm()">Buscar</button>
          </div>
        </div>

        <div class="badges" id="badges" style="display:none;">
          <span class="badge" id="statusBadge">Estado</span>
          <span class="badge" id="timeBadge">Tiempo</span>
          <span class="badge" id="countBadge">Resultados</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead><tr id="theadRow"></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

        <div class="note">
          Nota: la placa se normaliza automáticamente (mayúscula, sin espacios ni símbolos).
        </div>
      </div>
    </div>

    <script>
      // ===========
      // SELECTOR por NOMBRE DE COLUMNA (según tu Excel)
      // ===========
      const DESIRED = [
        { key: "CUMPLIDO EL",           show: "CUMPLIDO EL",           type: "dateMask" },
        { key: "ESTADO DE CUMPLIDO",    show: "ESTADO DE CUMPLIDO",    type: "text" },
        { key: "PAGADO EL",             show: "PAGADO EL",             type: "dateMask" },
        { key: "FECHAS VIAJES",         show: "FECHAS VIAJES",         type: "dateMask" },
        { key: "PLACA",                 show: "PLACA",                 type: "firstLetterMask" }, // E
        { key: "CONDUCTOR",             show: "CONDUCTOR",             type: "firstLetterMask" }, // F
        { key: "VALOR TOTAL DEL FLETE", show: "VALOR TOTAL DEL FLETE", type: "text" }, // J
        { key: "ANTICIPO",              show: "ANTICIPO",              type: "text" }, // K
        { key: "ICA",                   show: "ICA",                   type: "text" }, // L
        { key: "INTER2,4%",             show: "INTER2,4%",             type: "text" }, // M
        { key: "RET",                   show: "RET",                   type: "text" }, // N
        { key: "VALOR TOTAL A PAGAR",   show: "VALOR TOTAL A PAGAR",   type: "text" }, // S
      ];

      // ===========
      // Helpers
      // ===========
      function normalizePlate(s) {
        return (s || "").toUpperCase().replace(/[^A-Z0-9]/g, "");
      }

      function pad2(n) { return String(n).padStart(2, "0"); }

      // DD-MM-****
      function dateMask(value) {
        if (value === null || value === undefined || value === "") return "";

        // Excel serial number
        if (typeof value === "number" && isFinite(value)) {
          const base = new Date(Date.UTC(1899, 11, 30));
          const d = new Date(base.getTime() + value * 86400000);
          return `${pad2(d.getUTCDate())}-${pad2(d.getUTCMonth() + 1)}-****`;
        }

        const s = String(value).trim();

        // ISO YYYY-MM-DD
        const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (iso) return `${iso[3]}-${iso[2]}-****`;

        // DD/MM/YYYY o DD-MM-YYYY
        const dmy = s.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})/);
        if (dmy) return `${pad2(dmy[1])}-${pad2(dmy[2])}-****`;

        // YYYY/MM/DD
        const ymd = s.match(/^(\d{4})[\/-](\d{1,2})[\/-](\d{1,2})/);
        if (ymd) return `${pad2(ymd[3])}-${pad2(ymd[2])}-****`;

        // Si no parece fecha, lo devolvemos tal cual (para no dañarlo)
        return s;
      }

      // Primera letra + *****
      function firstLetterMask(value) {
        if (value === null || value === undefined) return "";
        const s = String(value).trim();
        if (!s) return "";
        return s[0].toUpperCase() + "*****";
      }

      function applyType(type, value) {
        switch (type) {
          case "dateMask": return dateMask(value);
          case "firstLetterMask": return firstLetterMask(value);
          default: return (value === null || value === undefined) ? "" : String(value);
        }
      }

      function normHeader(h) {
        return String(h || "")
          .trim()
          .replace(/\s+/g, " ")
          .toUpperCase();
      }

      // ===========
      // Render
      // ===========
      function renderHeader() {
        const tr = document.getElementById("theadRow");
        tr.innerHTML = "";
        for (const c of DESIRED) {
          const th = document.createElement("th");
          th.textContent = c.show;
          tr.appendChild(th);
        }
      }

      function renderRows(headers, rows) {
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";

        if (!rows || !rows.length) return;

        // Mapa header -> índice
        const map = new Map();
        headers.forEach((h, i) => map.set(normHeader(h), i));

        for (const row of rows) {
          const tr = document.createElement("tr");

          for (const c of DESIRED) {
            const td = document.createElement("td");

            // si viene como array usamos índice por header
            if (Array.isArray(row)) {
              const idx = map.get(normHeader(c.key));
              const raw = (idx === undefined) ? "" : row[idx];
              td.textContent = applyType(c.type, raw);
            } else if (row && typeof row === "object") {
              // si viene como objeto: row["PLACA"]
              const raw = row[c.key] ?? row[normHeader(c.key)] ?? "";
              td.textContent = applyType(c.type, raw);
            } else {
              td.textContent = "";
            }

            tr.appendChild(td);
          }

          tbody.appendChild(tr);
        }
      }

      renderHeader();

      // ===========
      // Submit
      // ===========
      async function submitForm() {
        const btn = document.getElementById("btn");
        btn.disabled = true;

        const plate = normalizePlate(document.getElementById("plate").value);
        if (!plate) {
          alert("⚠️ La placa debe ingresarse SIN espacios, puntos, guiones u otros caracteres especiales.");
          btn.disabled = false;
          return;
        }

        const startDate = document.getElementById("startDate").value || null;
        const endDate = document.getElementById("endDate").value || null;

        document.getElementById("badges").style.display = "flex";
        const statusBadge = document.getElementById("statusBadge");
        const timeBadge = document.getElementById("timeBadge");
        const countBadge = document.getElementById("countBadge");

        statusBadge.className = "badge";
        statusBadge.textContent = "Consultando...";
        timeBadge.textContent = "Tiempo: ...";
        countBadge.textContent = "Resultados: ...";

        const t0 = performance.now();

        try {
          const resp = await fetch("/api/buscar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ plate, startDate, endDate }),
          });

          const ms = Math.round(performance.now() - t0);
          timeBadge.textContent = `Tiempo: ${ms} ms`;

          const text = await resp.text();
          let data;
          try { data = JSON.parse(text); }
          catch { data = null; }

          if (!resp.ok || !data) {
            statusBadge.className = "badge err";
            statusBadge.textContent = "Error";
            countBadge.textContent = "Resultados: 0";
            document.getElementById("tbody").innerHTML = "";
            alert("Error en API. Abre GitHub Actions > run > logs para ver el error.");
            btn.disabled = false;
            return;
          }

          // Normalización de respuesta:
          // 1) {headers:[], rows:[]}
          // 2) {rows:[]} donde rows[0] puede ser headers
          // 3) [] (array) donde [0] puede ser headers
          let headers = data.headers || null;
          let rows = data.rows || data.data || null;

          if (Array.isArray(data)) {
            rows = data;
          }

          // Si no vienen headers pero el primer row parece ser headers (strings conocidos)
          if (!headers && Array.isArray(rows) && rows.length > 0 && Array.isArray(rows[0])) {
            const first = rows[0].map(normHeader);
            const looksLikeHeader =
              first.includes(normHeader("PLACA")) &&
              first.includes(normHeader("CONDUCTOR")) &&
              first.includes(normHeader("FECHAS VIAJES"));

            if (looksLikeHeader) {
              headers = rows[0];
              rows = rows.slice(1);
            }
          }

          // Si aún no hay headers, NO se puede mapear bien -> avisar
          if (!headers || !Array.isArray(headers)) {
            statusBadge.className = "badge err";
            statusBadge.textContent = "Error";
            countBadge.textContent = "Resultados: 0";
            document.getElementById("tbody").innerHTML = "";
            alert("Tu API no está enviando headers. Debe enviar headers para poder filtrar columnas por nombre.");
            btn.disabled = false;
            return;
          }

          countBadge.textContent = `Resultados: ${rows.length}`;
          statusBadge.className = "badge ok";
          statusBadge.textContent = "OK";

          renderRows(headers, rows);

        } catch (e) {
          statusBadge.className = "badge err";
          statusBadge.textContent = "Error";
          countBadge.textContent = "Resultados: 0";
          document.getElementById("tbody").innerHTML = "";
          alert("Error consultando la API. Revisa logs.");
        } finally {
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
